<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기분장애 임상평가 설문</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f7ff 0%, #e8f5e9 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading {
      text-align: center;
      color: #555;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #4263eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <p>로딩 중...</p>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY, ADMIN_EMAIL } from "./config.js";

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function route() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session?.user) {
        window.location.replace("login.html");
        return;
      }
      const user = session.user;
      // 관리자
      if (user.email?.toLowerCase() === ADMIN_EMAIL) {
        window.location.replace("admin.html");
        return;
      }
      // 프로필 확인
      const { data: prof } = await sb.from("profiles")
        .select("role")
        .eq("id", user.id)
        .maybeSingle();
      if (!prof) { window.location.replace("login.html"); return; }
      const map = {
        patient: "respondent.html",
        doctor: "doctor.html",
        admin: "admin.html",
        doctor_pending: "signup.html?pending=1"
      };
      window.location.replace(map[prof.role] || "login.html");
    }
    route();
  </script>
</body>
</html>
