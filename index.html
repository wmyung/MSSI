<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기분장애 임상평가 설문</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f7ff 0%, #e8f5e9 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .loading {
      text-align: center;
      color: #555;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e0e0;
      border-top-color: #4263eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 14px; margin: 0; }
  </style>
</head>
<body><!-- Hamburger Menu -->
<button id="hamburgerBtn" class="hamburger-btn no-print" onclick="toggleHamburger()" aria-label="Menu" style="position:fixed;top:10px;left:10px;z-index:100;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08);width:44px;height:44px;border:none;border-radius:12px;cursor:pointer;z-index:2000;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;">
  <span style="display:block;width:22px;height:2.5px;background:#333;border-radius:2px;transition:all 0.3s;"></span>
  <span style="display:block;width:22px;height:2.5px;background:#333;border-radius:2px;transition:all 0.3s;"></span>
  <span style="display:block;width:22px;height:2.5px;background:#333;border-radius:2px;transition:all 0.3s;"></span>
</button>
<div id="hamburgerOverlay" class="hamburger-overlay" onclick="toggleHamburger()" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.35);z-index:1500;"></div>
<div id="hamburgerMenu" class="hamburger-menu" style="display:flex;flex-direction:column;position:fixed;top:0;left:-280px;width:260px;height:100%;background:#fff;z-index:2001;box-shadow:4px 0 20px rgba(0,0,0,0.1);transition:left 0.3s ease;">
  <div class="hamburger-menu-header" style="display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid #eee;">
    <strong style="font-size:16px;">📋 Menu</strong>
    <button class="hamburger-menu-close" onclick="toggleHamburger()" style="width:36px;height:36px;border:none;background:#f5f5f5;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">X</button>
  </div>
  <nav class="hamburger-menu-nav" style="display:flex;flex-direction:column;padding:12px 0;">
    <a href="login.html" onclick="toggleHamburger()" style="display:flex;align-items:center;gap:10px;padding:14px 20px;color:#333;text-decoration:none;font-size:15px;font-weight:500;min-height:44px;">Login</a>
    <a href="signup-patient.html" onclick="toggleHamburger()" style="display:flex;align-items:center;gap:10px;padding:14px 20px;color:#333;text-decoration:none;font-size:15px;font-weight:500;min-height:44px;">Patient Signup</a>
    <a href="signup-doctor.html" onclick="toggleHamburger()" style="display:flex;align-items:center;gap:10px;padding:14px 20px;color:#333;text-decoration:none;font-size:15px;font-weight:500;min-height:44px;">Doctor Signup</a>
    <a href="admin.html" onclick="toggleHamburger()" style="display:flex;align-items:center;gap:10px;padding:14px 20px;color:#333;text-decoration:none;font-size:15px;font-weight:500;min-height:44px;">Admin</a>
  </nav>
</div>
<script>
function toggleHamburger(){
  var o=document.getElementById("hamburgerOverlay");
  var m=document.getElementById("hamburgerMenu");
  var b=document.getElementById("hamburgerBtn");
  if(o&&m&&b){
    o.classList.toggle("open");
    m.classList.toggle("open");
    b.classList.toggle("open");
    if(o.style.display==="none"||o.style.display===""){o.style.display="block";}else{o.style.display="none";}
    if(m.style.left==="0px"){m.style.left="-280px";}else{m.style.left="0px";}
    document.body.style.overflow=document.body.style.overflow==="hidden"?"":"hidden";
  }
}
</script>
  <div class="loading">
    <div class="spinner"></div>
    <p>로딩 중...</p>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY, ADMIN_EMAIL } from "./config.js";

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function route() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session?.user) {
        window.location.replace("login.html?role=patient");
        return;
      }
      const user = session.user;

      if (user.email?.toLowerCase() === ADMIN_EMAIL) {
        window.location.replace("admin.html");
        return;
      }

      const { data: prof } = await sb.from("profiles")
        .select("role")
        .eq("id", user.id)
        .maybeSingle();
      if (!prof) { window.location.replace("login.html"); return; }
      const map = {
        patient: "respondent.html",
        doctor: "doctor.html",
        admin: "admin.html",
        doctor_pending: "signup-doctor.html?pending=1"
      };
      window.location.replace(map[prof.role] || "login.html");
    }
    route();
  </script>
</body>
</html>
