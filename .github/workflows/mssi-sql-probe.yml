name: MSSI SQL Probe
"on":
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe RPC helpers
        env:
          U: ${{ secrets.SUPABASE_URL }}
          K: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          for fn in exec_sql execute_sql run_sql query sql; do
            code=$(curl -sS -o /tmp/out -w '%{http_code}' -X POST "$U/rest/v1/rpc/$fn" \
              -H "apikey: $K" \
              -H "Content-Type: application/json" \
              -d '{"query":"select 1","sql":"select 1"}')
            msg=$(tr -d '\n' < /tmp/out | cut -c1-220)
            echo "$fn http=$code $msg"
          done
