
name: Supabase Keep-Alive

on:
  schedule:

    - cron: '0 6 * * 1,3,5'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Supabase DB 핑
        run: |
          curl -s -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?limit=1&select=id" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -o /dev/null -w "DB ping: HTTP %{http_code}\n"
      - name: Supabase Auth 핑
        run: |
          curl -s -X GET "${{ secrets.SUPABASE_URL }}/auth/v1/admin/users?page=1&per_page=1" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_KEY }}" \
            -o /dev/null -w "Auth ping: HTTP %{http_code}\n"
