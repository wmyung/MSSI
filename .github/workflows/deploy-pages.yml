
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject runtime config
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          GOOGLE_SHEETS_WEBHOOK_URL: ${{ secrets.GOOGLE_SHEETS_WEBHOOK_URL }}
        run: |
          python3 - <<'PY'
          import os, pathlib, re

          path = pathlib.Path('config.js')
          text = path.read_text()

          replacements = {
              'SUPABASE_URL': os.environ.get('VITE_SUPABASE_URL', '').strip(),
              'ADMIN_EMAIL': os.environ.get('ADMIN_EMAIL', '').strip(),
              'GOOGLE_SHEETS_WEBHOOK_URL': os.environ.get('GOOGLE_SHEETS_WEBHOOK_URL', '').strip(),
          }

          for name, value in replacements.items():
              if not value:
                  continue
              pattern = rf'export const {name} = ENV\.[A-Z0-9_]+ \|\| "[^"]*";'
              text = re.sub(pattern, f'export const {name} = ENV.{"VITE_" if name in {"SUPABASE_URL", "SUPABASE_ANON_KEY"} else ""}{name} || "{value}";', text)

          path.write_text(text)
          print('runtime config injected')
          PY

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
