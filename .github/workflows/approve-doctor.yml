name: Approve Doctor
on:
  workflow_dispatch:
jobs:
  approve:
    runs-on: ubuntu-latest
    steps:
      - name: Approve doctor via Auth Admin API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "Updating user role to doctor..."
          curl -s -X PUT "${SUPABASE_URL}/auth/v1/admin/users/a8b10efc-4ff1-4288-86c8-6bfcf9531f68" \
            -H "Authorization: Bearer $SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -d '{"user_metadata": {"role": "doctor", "username": "snubhteam", "doctor_name": "분당기분팀", "hospital_name": "분당서울대학교병원", "hospital_code": "SNUBH01"}}' -w "\nHTTP %{http_code}\n"
