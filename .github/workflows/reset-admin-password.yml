name: Reset Admin Password

on:
  workflow_dispatch:
    inputs:
      email:
        description: Admin email
        required: true
      new_password:
        description: New password
        required: true

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset password via Supabase Admin API
        shell: bash
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_EMAIL: ${{ inputs.email }}
          NEW_PASSWORD: ${{ inputs.new_password }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys, urllib.parse, urllib.request

          url = os.environ['SUPABASE_URL'].rstrip('/')
          key = os.environ['SUPABASE_SERVICE_KEY']
          email = os.environ['ADMIN_EMAIL']
          password = os.environ['NEW_PASSWORD']

          headers = {
              'apikey': key,
              'Authorization': f'Bearer {key}',
              'Content-Type': 'application/json',
          }

          def req(method, path, body=None):
              data = None if body is None else json.dumps(body).encode()
              r = urllib.request.Request(url + path, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(r, timeout=30) as resp:
                      raw = resp.read().decode()
                      return resp.status, json.loads(raw or '{}')
              except urllib.error.HTTPError as e:
                  raw = e.read().decode(errors='replace')
                  print(f'HTTP {e.code}: {raw[:500]}', file=sys.stderr)
                  raise

          status, data = req('GET', '/auth/v1/admin/users?page=1&per_page=100')
          users = data.get('users') or []
          target = next((u for u in users if (u.get('email') or '').lower() == email.lower()), None)
          if not target:
              raise SystemExit('admin user not found')

          user_id = target['id']
          req('PUT', f'/auth/v1/admin/users/{urllib.parse.quote(user_id)}', {'password': password})
          print('password reset completed')
          PY
