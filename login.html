<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>로그인 — 기분장애 임상평가 설문</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">

<div class="auth-wrapper">
  <div class="auth-header">
    <h1>📋 로그인</h1>
  </div>
  <div class="auth-card">
    <div id="authMsg" class="status-msg"></div>

    <!-- 환자 로그인 -->
    <div id="form-patient">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="p_id" placeholder="아이디 입력" autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="p_pw" placeholder="비밀번호" autocomplete="current-password">
      </div>
    </div>

    <!-- 의사 로그인 -->
    <div id="form-doctor" style="display:none;">
      <div class="form-group">
        <label>아이디</label>
        <input type="text" id="d_id" placeholder="아이디 입력" autocomplete="username">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="d_pw" placeholder="비밀번호" autocomplete="current-password">
      </div>
    </div>

    <!-- 관리자 로그인 -->
    <div id="form-admin" style="display:none;">
      <div class="form-group">
        <label>관리자 이메일</label>
        <input type="email" id="a_email" placeholder="snumood@gmail.com">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="a_pw" placeholder="비밀번호" autocomplete="current-password">
      </div>
    </div>

    <div class="form-actions">
      <label class="save-id">
        <input type="checkbox" id="saveIdCheck">
        아이디 저장
      </label>
    </div>

    <button id="btnLogin" class="btn primary">로그인</button>

    <div class="auth-link">
      <a id="signupLink" href="signup-patient.html">처음 사용하시나요? 회원가입</a>
    </div>
  </div>
</div>

<script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
  import { SUPABASE_URL, SUPABASE_ANON_KEY, PATIENT_EMAIL_DOMAIN, DOCTOR_EMAIL_DOMAIN, ADMIN_EMAIL } from "./config.js";

  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let selectedRole = "patient";

  const $ = id => document.getElementById(id);
  const setMsg = (msg, type) => {
    const el = $("authMsg");
    el.className = `status-msg show ${type}`;
    el.textContent = msg;
  };
  const clearMsg = () => { $("authMsg").className = "status-msg"; };

  const urlRole = new URLSearchParams(location.search).get("role");
  if (urlRole === "doctor") {
    selectedRole = "doctor";
    $("form-patient").style.display = "none";
    $("form-doctor").style.display = "block";
    $("signupLink").href = "signup-doctor.html";
    $("signupLink").textContent = "처음 사용하시나요? 의사 회원가입";
  } else if (urlRole === "admin") {
    selectedRole = "admin";
    $("form-patient").style.display = "none";
    $("form-admin").style.display = "block";
    $("signupLink").style.display = "none";
  } else {
    selectedRole = "patient";
    $("signupLink").href = "signup-patient.html";
    $("signupLink").textContent = "처음 사용하시나요? 회원가입";
  }

  const saved = localStorage.getItem("saved_id") || "";
  if (saved) {
    const el = selectedRole === "patient" ? $("p_id") : $("d_id");
    const chk = $("saveIdCheck");
    if (el) el.value = saved;
    if (chk) chk.checked = true;
  }

  $("btnLogin").addEventListener("click", async () => {
    clearMsg();
    let email, pw;

    try {
      if (selectedRole === "patient") {
        const id = $("p_id").value.trim();
        if (!id) throw "아이디를 입력하세요.";
        if (id.length < 2) throw "아이디는 2자 이상이어야 합니다.";
        email = `${id}@${PATIENT_EMAIL_DOMAIN}`;
        pw = $("p_pw").value;
      } else if (selectedRole === "doctor") {
        const id = $("d_id").value.trim();
        if (!id) throw "아이디를 입력하세요.";
        email = `${id}@${DOCTOR_EMAIL_DOMAIN}`;
        pw = $("d_pw").value;
      } else {
        const val = $("a_email").value.trim();
        if (!val) throw "이메일을 입력하세요.";
        if (val.toLowerCase() !== ADMIN_EMAIL) throw "관리자 계정이 아닙니다.";
        email = val;
        pw = $("a_pw").value;
      }

      if (!pw) throw "비밀번호를 입력하세요.";

      const saveId = $("saveIdCheck").checked ? email.split("@")[0] : null;
      if (saveId) localStorage.setItem("saved_id", saveId);
      else localStorage.removeItem("saved_id");

      setMsg("로그인 중...", "info");
      $("btnLogin").disabled = true;

      const { error } = await sb.auth.signInWithPassword({ email, password: pw });
      if (error) throw "로그인 실패. 정보를 확인하세요.";
    } catch (e) {
      setMsg(typeof e === "string" ? e : (e.message || "오류 발생"), "error");
      $("btnLogin").disabled = false;
    }
  });

  document.querySelectorAll("input").forEach(inp => {
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") $("btnLogin").click();
    });
  });

  const redirectMap = {
    patient: "respondent.html",
    doctor: "doctor.html",
    admin: "admin.html"
  };

  sb.auth.onAuthStateChange((event, session) => {
    if (event === "SIGNED_IN") {
      const user = session?.user;
      if (!user) return;

      if (user.email?.toLowerCase() === ADMIN_EMAIL) {
        window.location.href = "admin.html";
        return;
      }

      setTimeout(async () => {
        let prof = null;
        for (let i = 0; i < 5; i++) {
          const { data } = await sb.from("profiles").select("role").eq("id", user.id).maybeSingle();
          if (data) { prof = data; break; }
          await new Promise(r => setTimeout(r, 500));
        }
        if (prof) {
          let target = redirectMap[prof.role] || "respondent.html";
          if (prof.role === "doctor_pending") target = "signup-doctor.html?pending=1";
          window.location.href = target;
        }
      }, 300);
    }
  });
</script>
</body>
</html>
