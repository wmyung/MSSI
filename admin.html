<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>관리자 대시보드 – 기분장애 임상평가 설문</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* ─── Admin-specific overrides ─── */
    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .admin-header h2 {
      margin: 0;
      font-size: 22px;
      font-weight: 800;
    }
    .admin-header-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--text-main);
    }
    .section-header .list-section-title {
      margin: 0;
      padding: 0;
      border-bottom: none;
    }
    .section-body {
      margin-bottom: 36px;
    }
    .admin-empty {
      padding: 24px 0;
      font-size: 14px;
      color: var(--text-sub);
      text-align: center;
    }
    .admin-loading {
      padding: 20px 0;
      font-size: 14px;
      color: var(--text-sub);
      text-align: center;
    }
    .admin-error {
      padding: 16px;
      background: var(--red-bg);
      color: var(--red);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }
    /* ─── Responsive tweaks ─── */
    @media (max-width: 600px) {
      .admin-header { flex-direction: column; align-items: stretch; }
      .admin-header-actions { justify-content: stretch; }
      .admin-header-actions .btn { flex: 1; min-width: 0; }
      .list-row { flex-direction: column; align-items: flex-start; gap: 10px; }
      .list-actions { align-self: stretch; }
      .list-actions .btn { flex: 1; }
    }
  </style>
</head>
<body>

<!-- ══════════ 헤더 ══════════ -->
<header id="mainHeader">
  <h1>기분장애 임상평가 설문 – 관리자</h1>
  <div class="header-right">
    <span id="userBadge" class="user-badge" style="display:none;"></span>
    <button id="btnLogout" class="btn secondary sm" style="display:none;">로그아웃</button>
  </div>
</header>

<div class="container">

  <!-- ══════════ 로그인 뷰 ══════════ -->
  <div id="view-auth" class="view active">
    <div class="card" style="max-width:440px; margin:0 auto;">
      <h2 class="card-title text-center" style="text-align:center;">관리자 로그인</h2>
      <div class="form-group">
        <label>관리자 이메일</label>
        <input type="email" id="a_email" placeholder="snumood@gmail.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>비밀번호</label>
        <input type="password" id="a_pw" autocomplete="current-password">
      </div>
      <div id="authMsg" class="status-msg"></div>
      <button id="btnLogin" class="btn primary">로그인</button>
    </div>
  </div>

  <!-- ══════════ 관리자 대시보드 뷰 ══════════ -->
  <div id="view-admin" class="view">
    <div class="card">
      <div class="admin-header">
        <h2>관리자 대시보드</h2>
        <div class="admin-header-actions">
          <button id="btnExportAll" class="btn secondary sm" style="min-width:80px;">📥 전체 내보내기</button>
          <button id="btnAdminRefresh" class="btn primary sm" style="min-width:80px;">🔄 새로고침</button>
        </div>
      </div>

      <!-- 승인 대기 의사 -->
      <div class="section-body">
        <div class="section-header">
          <div class="list-section-title">승인 대기 의사</div>
          <button id="btnRefreshPending" class="btn secondary sm" style="min-width:70px;">새로고침</button>
        </div>
        <div id="adminPendingList"></div>
      </div>

      <!-- 등록된 의사 목록 -->
      <div class="section-body">
        <div class="section-header">
          <div class="list-section-title">등록된 의사 목록</div>
          <button id="btnRefreshDoctors" class="btn secondary sm" style="min-width:70px;">새로고침</button>
        </div>
        <div id="adminDoctorList"></div>
      </div>
    </div>
  </div>

</div><!-- /.container -->

<script type="module">
  // ─── IMPORTS ──────────────────────────────────────────────
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
  import { SUPABASE_URL, SUPABASE_ANON_KEY, ADMIN_EMAIL } from "./config.js";

  // ─── SUPABASE CLIENT ──────────────────────────────────────
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ─── DOM HELPERS ──────────────────────────────────────────
  const $  = sel => document.querySelector(sel);
  const $$ = sel => document.querySelectorAll(sel);
  const el = id  => document.getElementById(id);

  function showView(id) {
    $$(".view").forEach(v => v.classList.remove("active"));
    const target = el(id);
    if (target) { target.classList.add("active"); window.scrollTo(0, 0); }
  }

  function setMsg(id, msg, type = "info") {
    const el_ = el(id);
    if (!el_) return;
    el_.className = `status-msg show ${type}`;
    el_.textContent = msg;
    if (type === "ok") setTimeout(() => { el_.className = "status-msg"; }, 3500);
  }

  function clearMsg(id) {
    const el_ = el(id);
    if (el_) el_.className = "status-msg";
  }

  // ─── STATE ─────────────────────────────────────────────────
  const state = { user: null, session: null };

  // ─── AUTH: CHECK SESSION ──────────────────────────────────
  async function checkSession() {
    const { data: { session }, error } = await sb.auth.getSession();
    if (error) { console.error("Session error:", error); return null; }
    if (session?.user?.email === ADMIN_EMAIL) {
      state.user = session.user;
      state.session = session;
      showView("view-admin");
      el("userBadge").style.display = "inline";
      el("userBadge").textContent = "관리자";
      el("btnLogout").style.display = "inline-flex";
      await loadAdminPending();
      await loadAdminDoctors();
      return session;
    }
    // If logged in but wrong email — sign out
    if (session) {
      await sb.auth.signOut();
    }
    showView("view-auth");
    return null;
  }

  // ─── LOGIN ─────────────────────────────────────────────────
  el("btnLogin").addEventListener("click", async () => {
    const email = el("a_email").value.trim();
    const password = el("a_pw").value;
    if (!email || !password) {
      setMsg("authMsg", "이메일과 비밀번호를 입력해주세요.", "warn");
      return;
    }
    if (email !== ADMIN_EMAIL) {
      setMsg("authMsg", "관리자 이메일이 올바르지 않습니다.", "error");
      return;
    }
    clearMsg("authMsg");
    el("btnLogin").disabled = true;
    el("btnLogin").textContent = "로그인 중...";
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    el("btnLogin").disabled = false;
    el("btnLogin").textContent = "로그인";
    if (error) {
      setMsg("authMsg", "로그인 실패: " + error.message, "error");
      return;
    }
    if (data?.user?.email === ADMIN_EMAIL) {
      state.user = data.user;
      state.session = data.session;
      showView("view-admin");
      el("userBadge").style.display = "inline";
      el("userBadge").textContent = "관리자";
      el("btnLogout").style.display = "inline-flex";
      await loadAdminPending();
      await loadAdminDoctors();
    } else {
      await sb.auth.signOut();
      setMsg("authMsg", "관리자 계정으로 로그인해주세요.", "error");
    }
  });

  // ─── LOGOUT ────────────────────────────────────────────────
  el("btnLogout").addEventListener("click", async () => {
    await sb.auth.signOut();
    state.user = null;
    state.session = null;
    el("userBadge").style.display = "none";
    el("btnLogout").style.display = "none";
    el("a_email").value = "";
    el("a_pw").value = "";
    showView("view-auth");
  });

  // ─── LOAD PENDING DOCTORS ─────────────────────────────────
  async function loadAdminPending() {
    const list = el("adminPendingList");
    if (!list) return;
    list.innerHTML = `<div class="admin-loading">로딩 중...</div>`;
    const { data, error } = await sb
      .from("profiles")
      .select("*")
      .eq("role", "doctor_pending")
      .order("created_at", { ascending: true });
    if (error) {
      list.innerHTML = `<div class="admin-error">오류: ${error.message}</div>`;
      return;
    }
    if (!data || data.length === 0) {
      list.innerHTML = `<div class="admin-empty">대기 중인 의사가 없습니다.</div>`;
      return;
    }
    list.innerHTML = data.map(d => `
      <div class="list-row">
        <div class="list-info">
          <div class="name">${escapeHtml(d.doctor_name) || "-"}</div>
          <div class="sub">${escapeHtml(d.hospital_name) || "-"} &nbsp;|&nbsp; ${escapeHtml(d.contact_email) || "-"}</div>
        </div>
        <div class="list-actions">
          <button class="btn primary sm approve-btn" data-id="${d.id}" data-name="${escapeAttr(d.doctor_name)}">승인</button>
        </div>
      </div>`).join("");
  }

  // ─── LOAD REGISTERED DOCTORS ──────────────────────────────
  async function loadAdminDoctors() {
    const list = el("adminDoctorList");
    if (!list) return;
    list.innerHTML = `<div class="admin-loading">로딩 중...</div>`;
    const { data, error } = await sb
      .from("profiles")
      .select("*")
      .in("role", ["doctor", "doctor_pending"])
      .order("doctor_name", { ascending: true });
    if (error) {
      list.innerHTML = `<div class="admin-error">오류: ${error.message}</div>`;
      return;
    }
    if (!data || data.length === 0) {
      list.innerHTML = `<div class="admin-empty">등록된 의사가 없습니다.</div>`;
      return;
    }
    list.innerHTML = data.map(d => {
      const roleLabel = d.role === "doctor" ? "승인됨" : "대기";
      const roleClass = d.role === "doctor" ? "green" : "yellow";
      return `
      <div class="list-row">
        <div class="list-info">
          <div class="name" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            ${escapeHtml(d.doctor_name) || "-"}
            <span class="badge ${roleClass}">${roleLabel}</span>
            <span class="badge gray">${escapeHtml(d.hospital_code) || "코드없음"}</span>
          </div>
          <div class="sub">${escapeHtml(d.hospital_name) || "-"}</div>
        </div>
        <div class="list-actions">
          <button class="btn secondary sm reset-btn" data-id="${d.id}">비밀번호 초기화</button>
        </div>
      </div>`;
    }).join("");
  }

  // ─── EVENT DELEGATION (승인 / 비밀번호 초기화) ────────────
  document.addEventListener("click", async (e) => {
    // 승인
    if (e.target.matches(".approve-btn")) {
      const id = e.target.dataset.id;
      const name = e.target.dataset.name || "해당";
      if (!confirm(`${name} 의사를 승인하시겠습니까?`)) return;
      e.target.disabled = true;
      e.target.textContent = "처리 중...";
      const { error } = await sb.rpc("approve_doctor", { p_doctor_id: id });
      e.target.disabled = false;
      e.target.textContent = "승인";
      if (error) {
        alert("승인 오류: " + error.message);
        return;
      }
      alert("승인 완료!");
      await loadAdminPending();
      await loadAdminDoctors();
      return;
    }

    // 비밀번호 초기화
    if (e.target.matches(".reset-btn")) {
      const id = e.target.dataset.id;
      const newPw = "000000";
      if (!confirm(`비밀번호를 '${newPw}'(으)로 초기화하시겠습니까?`)) return;
      e.target.disabled = true;
      e.target.textContent = "처리 중...";
      const { error } = await sb.rpc("admin_reset_password", {
        target_user_id: id,
        new_password: newPw
      });
      e.target.disabled = false;
      e.target.textContent = "비밀번호 초기화";
      if (error) {
        alert("오류: " + error.message);
      } else {
        alert("비밀번호 초기화 완료");
      }
      return;
    }
  });

  // ─── REFRESH BUTTONS ──────────────────────────────────────
  async function refreshAll() {
    const btn = el("btnAdminRefresh");
    btn.disabled = true;
    btn.textContent = "로딩 중...";
    await Promise.all([loadAdminPending(), loadAdminDoctors()]);
    btn.textContent = "🔄 새로고침";
    btn.disabled = false;
  }

  el("btnAdminRefresh")?.addEventListener("click", refreshAll);

  el("btnRefreshPending")?.addEventListener("click", async () => {
    const btn = el("btnRefreshPending");
    btn.disabled = true;
    btn.textContent = "로딩 중...";
    await loadAdminPending();
    btn.textContent = "새로고침";
    btn.disabled = false;
  });

  el("btnRefreshDoctors")?.addEventListener("click", async () => {
    const btn = el("btnRefreshDoctors");
    btn.disabled = true;
    btn.textContent = "로딩 중...";
    await loadAdminDoctors();
    btn.textContent = "새로고침";
    btn.disabled = false;
  });

  // ─── EXPORT ALL DATA ──────────────────────────────────────
  el("btnExportAll")?.addEventListener("click", async () => {
    const btn = el("btnExportAll");
    btn.disabled = true;
    btn.textContent = "내보내는 중...";
    const { data, error } = await sb
      .from("survey_responses")
      .select("*")
      .or("status.eq.completed,completed.eq.true");
    btn.disabled = false;
    btn.textContent = "📥 전체 내보내기";
    if (error) {
      alert("내보내기 오류: " + error.message);
      return;
    }
    if (!data || data.length === 0) {
      alert("데이터가 없습니다.");
      return;
    }
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `survey_export_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ─── UTILITY: ESCAPE HTML ─────────────────────────────────
  function escapeHtml(str) {
    if (str == null) return "";
    const div = document.createElement("div");
    div.textContent = String(str);
    return div.innerHTML;
  }
  function escapeAttr(str) {
    if (str == null) return "";
    return String(str).replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  // ─── INIT ──────────────────────────────────────────────────
  // Allow Enter key to trigger login
  el("a_pw").addEventListener("keydown", (e) => {
    if (e.key === "Enter") el("btnLogin").click();
  });
  el("a_email").addEventListener("keydown", (e) => {
    if (e.key === "Enter") el("btnLogin").click();
  });

  checkSession();
</script>
</body>
</html>
