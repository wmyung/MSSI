<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>회원가입 — 기분장애 임상평가 설문</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f0f7ff 0%, #e8f5e9 100%);
      padding: 24px 0;
    }
    .signup-wrapper {
      width: 100%;
      max-width: 440px;
      margin: 0 16px;
    }
    .signup-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .signup-header h1 {
      font-size: 20px;
      font-weight: 800;
      color: #1a237e;
      margin: 0 0 6px;
      letter-spacing: -0.5px;
    }
    .signup-header p { font-size: 13px; color: #666; margin: 0; }
    .signup-card {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .signup-card h2 {
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      margin: 0 0 20px;
      color: #333;
    }
    .role-select {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    .role-btn {
      flex: 1;
      padding: 14px 0;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      background: #fff;
      font-size: 14px;
      font-weight: 600;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .role-btn:hover { border-color: #4263eb; color: #4263eb; }
    .role-btn.active {
      border-color: #4263eb;
      background: #eef1ff;
      color: #4263eb;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
    }
    .form-group label .required {
      color: #e53e3e;
      font-size: 12px;
    }
    .form-group label .optional {
      color: #999;
      font-weight: 400;
      font-size: 11px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 13px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: #4263eb;
      box-shadow: 0 0 0 3px rgba(66,99,235,0.1);
    }
    .form-divider {
      height: 1px;
      background: #eee;
      margin: 20px 0;
    }
    .btn-signup {
      width: 100%;
      padding: 14px;
      background: #4263eb;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 8px;
    }
    .btn-signup:hover { background: #364fc7; }
    .btn-signup:active { transform: scale(0.98); }
    .btn-signup:disabled { background: #a5b4fc; cursor: not-allowed; transform: none; }
    .status-msg {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: none;
    }
    .status-msg.show { display: block; }
    .status-msg.error { background: #fee2e2; color: #b91c1c; }
    .status-msg.ok    { background: #d1fae5; color: #065f46; }
    .status-msg.info  { background: #dbeafe; color: #1e40af; }
    .auth-link {
      text-align: center;
      margin-top: 20px;
    }
    .auth-link a {
      font-size: 13px;
      color: #4263eb;
      text-decoration: none;
      font-weight: 600;
    }
    .auth-link a:hover { text-decoration: underline; }
    .pending-screen {
      text-align: center;
      padding: 20px 0;
    }
    .pending-screen .icon { font-size: 40px; margin-bottom: 12px; }
    .pending-screen h3 { font-size: 18px; margin: 0 0 8px; }
    .pending-screen p { font-size: 14px; color: #666; margin: 0 0 6px; }
    .info-badge {
      font-size: 12px;
      color: #666;
      background: #f0f4ff;
      padding: 8px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .info-badge strong { color: #4263eb; }
    @media (max-width: 480px) {
      .signup-card { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <div class="signup-wrapper">
    <div class="signup-header">
      <h1>📋 회원가입</h1>
      <p>기분장애 임상평가 설문 시스템</p>
    </div>

    <div class="signup-card" id="cardSignup">
      <h2>새 계정 만들기</h2>

      <div id="signupMsg" class="status-msg"></div>

      <!-- 역할 선택 -->
      <div class="role-select">
        <button class="role-btn active" data-role="patient">응답자</button>
        <button class="role-btn" data-role="doctor">의사</button>
      </div>

      <!-- 공통 필드 -->
      <div class="form-group">
        <label>아이디 <span class="required">*</span></label>
        <input type="text" id="s_id" placeholder="로그인에 사용할 아이디" autocomplete="off">
      </div>
      <div class="form-group">
        <label>비밀번호 <span class="required">*</span></label>
        <input type="password" id="s_pw" placeholder="4자리 이상" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>비밀번호 확인 <span class="required">*</span></label>
        <input type="password" id="s_pw2" placeholder="비밀번호 다시 입력" autocomplete="new-password">
      </div>

      <div class="form-divider"></div>

      <!-- 환자 전용 -->
      <div id="fields-patient">
        <div class="form-group">
          <label>생년월일 <span class="required">*</span></label>
          <input type="date" id="s_dob">
        </div>
        <div class="form-group">
          <label>병원코드 <span class="required">*</span></label>
          <input type="text" id="s_hcode" placeholder="의사에게 받은 병원코드">
        </div>
        <div class="form-group">
          <label>의사에게 받은 번호 <span class="optional">(선택)</span></label>
          <input type="text" id="s_pnum" placeholder="예: 12345">
        </div>
      </div>

      <!-- 의사 전용 -->
      <div id="fields-doctor" style="display:none;">
        <div class="info-badge">
          💡 의사는 <strong>이메일 없이 아이디만으로 가입</strong>합니다.
          가입 후 관리자 승인이 필요합니다.
        </div>
        <div class="form-group">
          <label>이름 <span class="required">*</span></label>
          <input type="text" id="s_dname" placeholder="실명 입력">
        </div>
        <div class="form-group">
          <label>병원명 <span class="required">*</span></label>
          <input type="text" id="s_hname" placeholder="예: 분당서울대학교병원">
        </div>
        <div class="form-group">
          <label>병원코드 <span class="optional">(병원명 입력 시 자동 생성)</span></label>
          <input type="text" id="s_doctor_hcode" placeholder="자동 생성됩니다" readonly style="background:#f8f9fa;color:#888;">
        </div>
      </div>

      <button id="btnSignup" class="btn-signup">가입하기</button>

      <div class="auth-link">
        <a href="login.html">이미 계정이 있으신가요? 로그인</a>
      </div>
    </div>

    <!-- 승인 대기 화면 (가입 성공 후 표시) -->
    <div class="signup-card" id="cardPending" style="display:none;">
      <div class="pending-screen">
        <div class="icon">⏳</div>
        <h3>승인 대기 중</h3>
        <p><strong id="pendingName"></strong> 선생님의 가입이 접수되었습니다.</p>
        <p style="margin-top:8px;">관리자 승인 후 로그인하실 수 있습니다.</p>
        <div style="margin-top:24px;">
          <a href="login.html" class="btn-signup" style="display:inline-block;text-align:center;text-decoration:none;padding:12px 32px;">로그인으로 이동</a>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
    import { SUPABASE_URL, SUPABASE_ANON_KEY, PATIENT_EMAIL_DOMAIN, DOCTOR_EMAIL_DOMAIN } from "./config.js";

    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let selectedRole = "patient";

    const $ = id => document.getElementById(id);
    const setMsg = (msg, type) => {
      const el = $("signupMsg");
      el.className = `status-msg show ${type}`;
      el.textContent = msg;
    };
    const clearMsg = () => { $("signupMsg").className = "status-msg"; };

    // ─── 역할 전환 ───
    document.querySelectorAll(".role-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".role-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedRole = btn.dataset.role;
        $("fields-patient").style.display = selectedRole === "patient" ? "block" : "none";
        $("fields-doctor").style.display  = selectedRole === "doctor" ? "block" : "none";
        clearMsg();
      });
    });

    // 병원명 → 병원코드 자동 생성
    const CONSONANT_MAP = {
      'ㄱ':'G','ㄴ':'N','ㄷ':'D','ㄹ':'R','ㅁ':'M','ㅂ':'B','ㅅ':'S',
      'ㅇ':null,'ㅈ':'J','ㅊ':'C','ㅋ':'K','ㅌ':'T','ㅍ':'P','ㅎ':'H'
    };
    function extractConsonants(str) {
      let result = '';
      for (const ch of str) {
        const code = ch.charCodeAt(0);
        if (code >= 0xAC00 && code <= 0xD7A3) {
          const idx = Math.floor((code - 0xAC00) / 28 / 21);
          const cons = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'][idx];
          const mapped = CONSONANT_MAP[cons];
          if (mapped) result += mapped;
        }
      }
      return result;
    }
    async function generateHospitalCode(hospitalName) {
      const consonants = extractConsonants(hospitalName || "").slice(0, 4);
      const base = consonants || "HOSP";
      for (let a = 0; a < 10; a++) {
        const digits = String(Math.floor(Math.random() * 90) + 10);
        const code = base + digits;
        const { data } = await sb.from("profiles").select("id").eq("hospital_code", code).maybeSingle();
        if (!data) return code;
      }
      return base + String(Date.now()).slice(-4);
    }

    $("s_hname")?.addEventListener("input", async function() {
      if (this.value.trim().length >= 2) {
        const code = await generateHospitalCode(this.value.trim());
        $("s_doctor_hcode").value = code;
      }
    });

    // ─── 가입 처리 ───
    $("btnSignup").addEventListener("click", async () => {
      clearMsg();
      const id = $("s_id").value.trim();
      const pw = $("s_pw").value;
      const pw2 = $("s_pw2").value;

      try {
        if (!id) throw "아이디를 입력하세요.";
        if (id.length < 2) throw "아이디는 2자 이상이어야 합니다.";
        if (!pw) throw "비밀번호를 입력하세요.";
        if (pw.length < 4) throw "비밀번호는 4자리 이상이어야 합니다.";
        if (pw !== pw2) throw "비밀번호가 일치하지 않습니다.";

        const email = selectedRole === "patient"
          ? `${id}@${PATIENT_EMAIL_DOMAIN}`
          : `${id}@${DOCTOR_EMAIL_DOMAIN}`;

        let signUpMeta;

        if (selectedRole === "patient") {
          const dob = $("s_dob").value;
          const hcode = $("s_hcode").value.trim();
          if (!dob) throw "생년월일을 선택하세요.";
          if (!hcode) throw "병원코드를 입력하세요.";
          const { data: docProf } = await sb.from("profiles").select("id").eq("hospital_code", hcode).eq("role", "doctor").maybeSingle();
          if (!docProf) throw "존재하지 않거나 미승인된 병원코드입니다.";
          signUpMeta = {
            role: "patient",
            username: id,
            dob,
            hospital_code: hcode,
            patient_number: $("s_pnum").value.trim()
          };
        } else {
          const dname = $("s_dname").value.trim();
          const hname = $("s_hname").value.trim();
          if (!dname) throw "이름을 입력하세요.";
          if (!hname) throw "병원명을 입력하세요.";
          let hcode = $("s_doctor_hcode").value;
          if (!hcode) hcode = await generateHospitalCode(hname);
          signUpMeta = {
            role: "doctor_pending",
            username: id,
            doctor_name: dname,
            hospital_name: hname,
            hospital_code: hcode
          };
        }

        setMsg("가입 요청 중...", "info");
        $("btnSignup").disabled = true;

        const { data, error } = await sb.auth.signUp({
          email, password: pw,
          options: { data: signUpMeta }
        });
        if (error) throw error.message;
        if (!data.user) throw "가입 요청 실패.";

        // 성공
        if (selectedRole === "patient") {
          setMsg("가입 성공! 로그인 페이지로 이동합니다.", "ok");
          setTimeout(() => { window.location.href = "login.html"; }, 1500);
        } else {
          // 의사 → 승인 대기 화면
          $("cardSignup").style.display = "none";
          const pendName = $("pendingName");
          if (pendName) pendName.textContent = dname;
          $("cardPending").style.display = "block";
        }
      } catch (e) {
        setMsg(typeof e === "string" ? e : (e.message || "오류 발생"), "error");
        $("btnSignup").disabled = false;
      }
    });

    // Enter 키 submit
    document.querySelectorAll("#cardSignup input").forEach(inp => {
      inp.addEventListener("keydown", e => {
        if (e.key === "Enter") $("btnSignup").click();
      });
    });

    // ─── 승인 대기 상태 확인 (URL 파라미터) ───
    if (new URLSearchParams(location.search).get("pending") === "1") {
      $("cardSignup").style.display = "none";
      $("cardPending").style.display = "block";
    }
  </script>
</body>
</html>
